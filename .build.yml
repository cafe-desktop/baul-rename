##########################################################
# THE FOLLOWING LINES IS USED BY docker-build
##########################################################
requires:
  debian:
    # Useful URL: https://github.com/cafe-desktop/debian-packages
    - expect #required for unbuffer
    - python3
    - python3-polib
    - python3-setuptools

build_scripts:
  - mkdir html-report
  - unbuffer python3 setup.py build 2>&1 | tee -a --output-error=exit ./html-report/output_${TRAVIS_COMMIT}
  - unbuffer python3 setup.py install --root=/ --optimize=1 2>&1 | tee -a --output-error=exit ./html-report/output_${TRAVIS_COMMIT}
  - ./exit-warning
